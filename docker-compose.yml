services:
  aicontacts:
    image: ghcr.io/mstras/aicontacts:latest
    pull_policy: always
    # To build from source instead of pulling, comment out pull_policy above
    # and uncomment the line below:
    # build: .
    container_name: aicontacts
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8787}:8787"
